version: "3.9"

# CAIRIS Super Swarm v39 — Docker Compose
# Constitutional invariants enforced at container level

services:

  cairis-core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: cairis-v39-core
    restart: unless-stopped
    ports:
      - "7860:7860"   # Gradio UI (HuggingFace Spaces compatible)
      - "8000:8000"   # FastAPI REST
      - "9090:9090"   # Prometheus metrics
    environment:
      - CAIRIS_VERSION=39.0.0
      - SIGMA=1.0
      - RDOD=0.9777
      - UNIFIED_FREQ=23514.26
      - LOG_LEVEL=INFO
      - HF_TOKEN=${HF_TOKEN}
      - CLAWHUB_API_KEY=${CLAWHUB_API_KEY}
    volumes:
      - cairis-data:/app/data
      - cairis-merkle:/app/merkle
    networks:
      - cairis-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cairis-worldpulse:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worldpulse
    container_name: cairis-v39-worldpulse
    restart: unless-stopped
    environment:
      - WORLDPULSE_FREQ=23514.26
      - LOG_LEVEL=INFO
    networks:
      - cairis-net
    depends_on:
      - cairis-core

  cairis-redis:
    image: redis:7-alpine
    container_name: cairis-v39-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cairis-redis:/data
    networks:
      - cairis-net
    command: redis-server --appendonly yes

  cairis-prometheus:
    image: prom/prometheus:latest
    container_name: cairis-v39-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - cairis-prometheus:/prometheus
    networks:
      - cairis-net

volumes:
  cairis-data:
  cairis-merkle:
  cairis-redis:
  cairis-prometheus:

networks:
  cairis-net:
    driver: bridge
