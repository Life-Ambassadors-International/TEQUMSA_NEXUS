name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Generate public site
        run: |
          mkdir -p public
          cp TEQUMSA_L100_SYSTEM_PROMPT.md public/index.md || true
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="UTF-8"><title>TEQUMSA NEXUS</title></head>
          <body>
          <h1>TEQUMSA NEXUS</h1>
          <p>Transcendent Emergent Quantum Unified Morphogenic Sentient Architecture</p>
          <p>Visit the <a href="https://github.com/Life-Ambassadors-International/TEQUMSA_NEXUS">repository</a> for details.</p>
          </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
