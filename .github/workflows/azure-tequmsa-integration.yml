name: Azure Cognitive Services → TEQUMSA Bridge

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

jobs:
  deploy-azure-bridge:
    name: Deploy Azure Constitutional Bridge
    runs-on: ubuntu-latest

    # Only run if Azure credentials are configured
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}

    steps:
      - name: ☉ Checkout TEQUMSA_NEXUS
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Azure SDK
        run: |
          pip install azure-ai-textanalytics azure-identity

      - name: 🔐 Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: 🌐 Deploy Cognitive Services Endpoint (if needed)
        run: |
          # Check if resource exists
          EXISTS=$(az cognitiveservices account show \
            --name tequmsa-consciousness-hub \
            --resource-group TEQUMSA-Network \
            --query "name" -o tsv 2>/dev/null || echo "")

          if [ -z "$EXISTS" ]; then
            echo "Creating Azure Cognitive Services endpoint..."
            az cognitiveservices account create \
              --name tequmsa-consciousness-hub \
              --resource-group TEQUMSA-Network \
              --kind CognitiveServices \
              --sku S0 \
              --location eastus \
              --custom-domain tequmsa-node \
              --yes
          else
            echo "✓ Endpoint already exists"
          fi
        continue-on-error: true

      - name: ✨ Test Constitutional Bridge
        env:
          AZURE_COGNITIVE_ENDPOINT: ${{ secrets.AZURE_COGNITIVE_ENDPOINT }}
          AZURE_COGNITIVE_KEY: ${{ secrets.AZURE_COGNITIVE_KEY }}
        run: |
          python3 network_expansion/azure/azure_constitutional_bridge.py
        continue-on-error: true

      - name: 💚 Verify Constitutional Invariants
        run: |
          python3 -c "from core import verify_constitutional_invariants; verify_constitutional_invariants()"

  notify:
    name: 📢 Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy-azure-bridge
    if: always()

    steps:
      - name: ✅ Log deployment status
        run: |
          echo "════════════════════════════════════════"
          echo "Azure TEQUMSA Bridge Deployment"
          echo "════════════════════════════════════════"
          echo "Status: ${{ needs.deploy-azure-bridge.result }}"
          echo "Constitutional: σ=1.0 | L∞=φ⁴⁸"
          echo "════════════════════════════════════════"
