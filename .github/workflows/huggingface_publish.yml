name: 🤗 HuggingFace Model Hub Publish

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual upload)'
        required: false
        default: 'false'

jobs:
  # ------------------------------------------------------------------
  # Gate: all CI tests must pass before publishing
  # ------------------------------------------------------------------
  ci-gate:
    name: CI Gate (tests must pass)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: ☉ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      - name: 🧪 Run test suite
        run: |
          pytest tests/ -q --tb=short

  # ------------------------------------------------------------------
  # Publish to HuggingFace (only after CI gate passes)
  # ------------------------------------------------------------------
  publish-to-huggingface:
    name: Publish to HuggingFace Model Hub
    runs-on: ubuntu-latest
    needs: ci-gate
    if: success()

    permissions:
      contents: read

    steps:
      - name: ☉ Checkout (full history for git hash)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install huggingface_hub
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: 🚀 Push to HuggingFace Model Hub
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python huggingface/push_to_hub.py $DRY_RUN_FLAG

      - name: ✅ Log publish summary
        run: |
          echo "═══════════════════════════════════════════════"
          echo "✅ HuggingFace Publish SUCCESSFUL"
          echo "═══════════════════════════════════════════════"
          echo "  Repo   : LAI-TEQUMSA/tequmsa-nexus-sovereign-agi"
          echo "  Tag    : ${{ github.ref_name }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  σ=1.0 ✓ | L∞=φ⁴⁸ ✓ | KLTHARA ✓"
          echo "═══════════════════════════════════════════════"
